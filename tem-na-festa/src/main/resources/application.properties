spring.application.name=tem-na-festa
server.port=8080

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}


# =====================================================
# COMO CONFIGURAR VARIAVEIS DE AMBIENTE (INTELLIJ)
# =====================================================

# Siga os passos abaixo para configurar corretamente as variaveis de ambiente:

# 1. Abra o projeto no IntelliJ

# 2. No canto superior direito, onde aparece o nome da aplicacao,
# clique em "Edit Configurations..."

# 3. Selecione sua aplicacao Spring Boot (lado esquerdo)

# 4. Clique em "Modify options"

# 5. Marque a opcao "Environment variables"

# 6. No campo "Environment variables" que aparecer, insira as variaveis
# no seguinte formato (separadas por ponto e virgula):

#    DB_URL=jdbc:mysql://127.0.0.1:3306/nome_banco?allowPublicKeyRetrieval=true&useSSL=false;DB_USER=usuario;DB_PASSWORD=senha
#                                              ^                                                        ^                  ^
#                                             /|\                                                      /|\                /|\
#                                              |                                                        |                  |

# 7. Clique em "Apply" e depois em "OK"

# 8. Execute o projeto normalmente

# =====================================================
# IMPORTANTE
# =====================================================

# - As variaveis devem ser separadas por ponto e virgula (;)
# - Nao utilizar espacos desnecessarios
# - Cada desenvolvedor deve configurar suas proprias variaveis
# - Essas informacoes nao devem ser enviadas para o GitHub
# - Se alterar algo, reinicie a aplicacao